name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "compiler/**"
      - "plugins/**"
      - "samples/**"
      - "testFixtures/**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Print runner hardware and distro info
        shell: bash
        run: |
          echo "== Distro =="
          if command -v lsb_release >/dev/null 2>&1; then
            lsb_release -a
          else
            cat /etc/os-release
          fi
          echo
          echo "== Kernel =="
          uname -a
          echo
          echo "== CPU Summary =="
          lscpu
          echo
          echo "== Core Counts =="
          echo "Logical cores: $(nproc)"
          echo "Sockets: $(lscpu | awk -F: '/Socket\(s\)/ {gsub(/^[ \t]+/, "", $2); print $2}')"
          echo "Cores per socket: $(lscpu | awk -F: '/Core\(s\) per socket/ {gsub(/^[ \t]+/, "", $2); print $2}')"
          echo "Threads per core: $(lscpu | awk -F: '/Thread\(s\) per core/ {gsub(/^[ \t]+/, "", $2); print $2}')"
          echo
          echo "== CPU Model and Frequency =="
          lscpu | awk -F: '
            /Model name|CPU max MHz|CPU min MHz|CPU MHz|BogoMIPS/ {
              gsub(/^[ \t]+/, "", $2);
              print $1 ": " $2
            }'
          echo
          echo "== Memory =="
          free -h
          echo
          echo "== Memory Detail =="
          grep -E 'MemTotal|MemFree|MemAvailable|SwapTotal|SwapFree' /proc/meminfo

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Run cli without arguments
        run: ./vexa

      - name: Run testFixture/sample.vx
        run: pnpm cli testFixtures/sample.vx

      - name: Link global
        run: pnpm link --global

      - name: Run global
        run: vexa testFixtures/sample.vx

  native-macos:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run native smoke
        run: node --import tsx --test --test-reporter spec cli/nativeSmoke.test.ts

      - name: Run sanitized Oilpan stress smoke
        run: pnpm test:native:stress
