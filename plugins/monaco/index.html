<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VexaScript Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        background: #2d2d2d;
        border-bottom: 1px solid #3e3e3e;
        padding: 6px 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
        min-height: 36px;
      }
      header h1 {
        font-size: 13px;
        font-weight: 600;
        color: #cccccc;
        letter-spacing: 0.02em;
      }
      .file-name {
        font-size: 12px;
        color: #888;
        font-family: "Cascadia Code", "Fira Code", monospace;
      }
      .toolbar {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-group {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .tabs {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-left: 8px;
        min-width: 0;
        overflow-x: auto;
      }
      .tab {
        background: transparent;
        border: 1px solid transparent;
        border-bottom: none;
        color: #8e8e8e;
        font-size: 12px;
        padding: 5px 8px 6px;
        border-top-left-radius: 4px;
        border-top-right-radius: 4px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .tab:hover {
        color: #d4d4d4;
        background: #2a2a2a;
      }
      .tab.active {
        color: #f3f3f3;
        background: #1e1e1e;
        border-color: #3e3e3e;
      }
      .tab-label {
        white-space: nowrap;
      }
      .tab-close {
        color: #777;
        font-size: 11px;
      }
      .tab:hover .tab-close,
      .tab.active .tab-close {
        color: #bbb;
      }
      .btn {
        background: #3c3c3c;
        border: 1px solid #555;
        color: #ccc;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover {
        background: #4a4a4a;
        color: #fff;
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .status {
        font-size: 11px;
        color: #888;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .status::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #888;
        flex-shrink: 0;
      }
      .status.connecting::before { background: #e6a817; }
      .status.connected::before  { background: #4ec994; }
      .status.error::before      { background: #f44747; }
      main {
        flex: 1;
        overflow: hidden;
        display: flex;
        min-height: 0;
      }
      aside {
        width: 260px;
        border-right: 1px solid #323232;
        background: #252526;
        display: flex;
        flex-direction: column;
        min-width: 200px;
      }
      .sidebar-header {
        padding: 10px 12px 8px;
        border-bottom: 1px solid #323232;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sidebar-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #8f8f8f;
      }
      .sidebar-actions {
        display: flex;
        gap: 6px;
      }
      .icon-btn {
        width: 24px;
        height: 24px;
        border: 1px solid #3d3d3d;
        background: #2f2f2f;
        color: #cfcfcf;
        border-radius: 4px;
        cursor: pointer;
      }
      .icon-btn:hover {
        background: #3a3a3a;
      }
      #file-tree {
        flex: 1;
        overflow: auto;
        padding: 8px 0;
      }
      .tree-item {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        color: #cccccc;
        text-align: left;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
      }
      .tree-item:hover {
        background: #2f2f2f;
      }
      .tree-item.selected {
        background: #30353a;
      }
      .tree-item.active {
        color: #ffffff;
      }
      .editor-shell {
        flex: 1;
        min-width: 0;
        min-height: 0;
        position: relative;
      }
      .workspace-toggle {
        display: none;
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 30;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(37, 37, 38, 0.96);
        border-color: #4b4b4b;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      }
      .workspace-toggle[aria-expanded="true"] {
        background: rgba(52, 52, 54, 0.98);
      }
      .workspace-backdrop {
        display: none;
        position: absolute;
        inset: 0;
        z-index: 20;
        background: rgba(0, 0, 0, 0.22);
      }
      #editor-container {
        height: 100%;
        overflow: hidden;
      }
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        background: #3c3c3c;
        border: 1px solid #555;
        color: #ccc;
        font-size: 12px;
        padding: 6px 16px;
        border-radius: 4px;
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
      }
      .context-menu {
        position: fixed;
        display: none;
        min-width: 160px;
        background: #252526;
        border: 1px solid #3e3e3e;
        border-radius: 6px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        padding: 6px;
        z-index: 2000;
      }
      .context-menu button {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #d4d4d4;
        text-align: left;
        font-size: 12px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .context-menu button:hover {
        background: #094771;
      }
      .context-menu button:disabled {
        color: #777;
        cursor: default;
      }
      .context-menu button:disabled:hover {
        background: transparent;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      /* Gutter glyph marking lines where a Promise is implicitly awaited inside a sync function. */
      .vexa-auto-await-glyph {
        background-repeat: no-repeat;
        background-position: center center;
        background-size: 70%;
        cursor: default;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="none" stroke="%23c586c0" stroke-width="1.2"/><path d="M8 4.2v5.1" fill="none" stroke="%23c586c0" stroke-width="1.4" stroke-linecap="round"/><path d="M5.6 7.1 8 9.6l2.4-2.5" fill="none" stroke="%23c586c0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>');
      }
      @media (max-width: 900px) {
        body.workspace-compact aside {
          position: absolute;
          top: 48px;
          left: 8px;
          bottom: 8px;
          width: min(320px, calc(100% - 16px));
          min-width: 0;
          border: 1px solid #3b3b3b;
          border-radius: 8px;
          box-shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
          z-index: 40;
          display: none;
        }
        body.workspace-compact.workspace-open aside {
          display: flex;
        }
        body.workspace-compact .workspace-toggle {
          display: inline-flex;
        }
        body.workspace-compact.workspace-open .workspace-backdrop {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>VexaScript Editor</h1>
      <span class="file-name">main.vx</span>
      <div id="tabs" class="tabs"></div>
      <div class="toolbar">
        <div class="nav-group">
          <button class="btn" id="btn-nav-back" title="Go back (Alt+Ctrl+Cmd+Left)">Back</button>
          <button class="btn" id="btn-nav-forward" title="Go forward (Alt+Ctrl+Cmd+Right)">Forward</button>
        </div>
        <button class="btn" id="btn-format" title="Format document (Shift+Alt+F)">Format</button>
        <button class="btn" id="btn-save" title="Save file">Save</button>
        <span id="status" class="status connecting">Connecting…</span>
      </div>
    </header>
    <main>
      <aside id="workspace-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Workspace</span>
          <div class="sidebar-actions">
            <button id="btn-new-file" class="icon-btn" title="New file">+</button>
            <button id="btn-new-folder" class="icon-btn" title="New folder">#</button>
          </div>
        </div>
        <div id="file-tree"></div>
      </aside>
      <div class="editor-shell">
        <button id="btn-workspace-toggle" class="btn workspace-toggle" type="button" aria-expanded="false" aria-controls="workspace-sidebar">Show workspace</button>
        <div id="workspace-backdrop" class="workspace-backdrop"></div>
        <div id="editor-container"></div>
      </div>
    </main>
    <div id="toast"></div>
    <div id="tree-context-menu" class="context-menu">
      <button id="tree-context-open" type="button">Open</button>
      <button id="tree-context-delete" type="button">Delete</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
