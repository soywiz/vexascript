<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLang Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        background: #2d2d2d;
        border-bottom: 1px solid #3e3e3e;
        padding: 6px 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
        min-height: 36px;
      }
      header h1 {
        font-size: 13px;
        font-weight: 600;
        color: #cccccc;
        letter-spacing: 0.02em;
      }
      .file-name {
        font-size: 12px;
        color: #888;
        font-family: "Cascadia Code", "Fira Code", monospace;
      }
      .toolbar {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn {
        background: #3c3c3c;
        border: 1px solid #555;
        color: #ccc;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover {
        background: #4a4a4a;
        color: #fff;
      }
      .status {
        font-size: 11px;
        color: #888;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .status::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #888;
        flex-shrink: 0;
      }
      .status.connecting::before { background: #e6a817; }
      .status.connected::before  { background: #4ec994; }
      .status.error::before      { background: #f44747; }
      #editor-container {
        flex: 1;
        overflow: hidden;
      }
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        background: #3c3c3c;
        border: 1px solid #555;
        color: #ccc;
        font-size: 12px;
        padding: 6px 16px;
        border-radius: 4px;
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>MyLang Editor</h1>
      <span class="file-name">main.my</span>
      <div class="toolbar">
        <button class="btn" id="btn-format" title="Format document (Shift+Alt+F)">Format</button>
        <button class="btn" id="btn-save" title="Save file">Save</button>
        <span id="status" class="status connecting">Connecting…</span>
      </div>
    </header>
    <div id="editor-container"></div>
    <div id="toast"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
