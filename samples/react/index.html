<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg: #f4efe7;
                --bg-accent: #e3f0ea;
                --card: rgba(255, 252, 247, 0.88);
                --card-strong: #fffdf8;
                --text: #1f2522;
                --muted: #5f6d66;
                --line: rgba(31, 37, 34, 0.12);
                --brand: #0d8a6b;
                --brand-dark: #0a6b53;
                --shadow: 0 24px 70px rgba(33, 36, 32, 0.12);
                --radius-xl: 28px;
                --radius-lg: 20px;
                --radius-md: 14px;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Space Grotesk", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 28%),
                    radial-gradient(circle at right 10% top 15%, rgba(13, 138, 107, 0.18), transparent 26%),
                    linear-gradient(135deg, var(--bg), var(--bg-accent));
            }

            body::before,
            body::after {
                content: "";
                position: fixed;
                inset: auto;
                border-radius: 999px;
                pointer-events: none;
                z-index: 0;
                filter: blur(8px);
            }

            body::before {
                width: 260px;
                height: 260px;
                left: -70px;
                bottom: 50px;
                background: rgba(255, 172, 120, 0.18);
            }

            body::after {
                width: 220px;
                height: 220px;
                right: -40px;
                top: 40px;
                background: rgba(98, 137, 255, 0.14);
            }

            #app {
                position: relative;
                z-index: 1;
                width: min(760px, calc(100vw - 32px));
                margin: 40px auto;
            }

            .app {
                display: grid;
                gap: 20px;
                padding: 28px;
                border: 1px solid rgba(255, 255, 255, 0.6);
                border-radius: var(--radius-xl);
                background: var(--card);
                box-shadow: var(--shadow);
                backdrop-filter: blur(18px);
            }

            .hero,
            .route-shell,
            .content-card {
                border-radius: var(--radius-lg);
            }

            .hero {
                padding: 10px 4px 6px;
            }

            .hero h1,
            .section-heading h2 {
                margin: 0;
                line-height: 0.95;
                letter-spacing: -0.04em;
            }

            .hero h1 {
                font-size: clamp(2.8rem, 8vw, 4.8rem);
                max-width: 8ch;
            }

            .hero p,
            .section-heading p {
                margin: 10px 0 0;
                max-width: 48ch;
                color: var(--muted);
                font-size: 1rem;
            }

            .eyebrow {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 14px;
                padding: 7px 12px;
                border-radius: 999px;
                font-size: 0.74rem;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--brand-dark);
                background: rgba(13, 138, 107, 0.12);
            }

            .metric-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 14px;
            }

            .metric {
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                gap: 12px;
                padding: 18px 20px;
                border: 1px solid var(--line);
                border-radius: var(--radius-md);
                background: var(--card-strong);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
                font-size: 1rem;
            }

            .metric strong,
            .todo-title,
            .counter-value {
                font-weight: 700;
            }

            .route-shell,
            .content-card {
                display: grid;
                gap: 18px;
                padding: 22px;
                border: 1px solid var(--line);
                background:
                    linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.8)),
                    var(--card-strong);
            }

            .route-toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                flex-wrap: wrap;
            }

            .route-pills {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .route-pill {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 110px;
                padding: 11px 16px;
                border-radius: 999px;
                text-decoration: none;
                color: var(--text);
                background: rgba(13, 138, 107, 0.08);
                border: 1px solid rgba(13, 138, 107, 0.12);
                transition: transform 120ms ease, background 120ms ease, color 120ms ease;
            }

            .route-pill-active {
                color: white;
                background: linear-gradient(135deg, var(--brand), var(--brand-dark));
                box-shadow: 0 10px 20px rgba(13, 138, 107, 0.18);
            }

            .route-path {
                color: var(--muted);
                font-size: 0.95rem;
            }

            .route-path code {
                font-family: "IBM Plex Mono", monospace;
            }

            .counter {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                padding: 16px;
                border-radius: var(--radius-md);
                background: linear-gradient(135deg, rgba(13, 138, 107, 0.1), rgba(98, 137, 255, 0.1));
            }

            .counter-value {
                flex: 1;
                text-align: center;
                font-size: clamp(1.15rem, 3vw, 1.5rem);
            }

            button {
                border: 0;
                cursor: pointer;
                font: inherit;
                transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
            }

            button:hover {
                transform: translateY(-1px);
            }

            button:active {
                transform: translateY(0);
            }

            .counter-button,
            .action-button {
                color: white;
                background: linear-gradient(135deg, var(--brand), var(--brand-dark));
                box-shadow: 0 10px 20px rgba(13, 138, 107, 0.22);
            }

            .counter-button {
                width: 46px;
                height: 46px;
                border-radius: 14px;
                font-size: 1.4rem;
                font-weight: 700;
            }

            .action-button {
                padding: 12px 16px;
                border-radius: 12px;
                font-weight: 700;
            }

            .todo-panel {
                display: grid;
                gap: 14px;
                padding: 16px;
                border-radius: var(--radius-md);
                border: 1px solid var(--line);
                background: rgba(255, 255, 255, 0.72);
            }

            .todo-toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }

            .todo-panel ul {
                margin: 0;
                padding: 0;
                list-style: none;
                display: grid;
                gap: 10px;
            }

            .todo-panel li {
                position: relative;
                padding: 12px 14px 12px 42px;
                border-radius: 12px;
                background: var(--card-strong);
                border: 1px solid rgba(13, 138, 107, 0.1);
                color: var(--text);
            }

            .todo-panel li::before {
                content: "";
                position: absolute;
                left: 16px;
                top: 50%;
                width: 12px;
                height: 12px;
                border-radius: 999px;
                background: linear-gradient(135deg, #ff9d66, var(--brand));
                transform: translateY(-50%);
                box-shadow: 0 0 0 5px rgba(13, 138, 107, 0.08);
            }

            .query-state,
            .query-result strong {
                font-size: 1rem;
            }

            .query-error {
                color: #b4432f;
            }

            .query-result ul {
                margin: 14px 0 0;
                padding-left: 18px;
                display: grid;
                gap: 10px;
                color: var(--muted);
            }

            @media (max-width: 640px) {
                #app {
                    width: min(100vw - 20px, 760px);
                    margin: 18px auto;
                }

                .app {
                    padding: 18px;
                    gap: 16px;
                }

                .metric-grid {
                    grid-template-columns: 1fr;
                }

                .counter,
                .todo-toolbar,
                .route-toolbar {
                    flex-direction: column;
                    align-items: stretch;
                }

                .counter-value {
                    order: -1;
                }

                .counter-button,
                .action-button {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module">
            import * as React from "https://esm.sh/react@18.3.1"
            import * as ReactDOM from "https://esm.sh/react-dom@18.3.1"

            globalThis.React = React
            globalThis.ReactDOM = ReactDOM

            await import("%VEXA_ENTRYPOINT%")
        </script>
    </body>
</html>
