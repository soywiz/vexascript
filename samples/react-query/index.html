<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            :root {
                --bg: #f3efe8;
                --card: #fffdf9;
                --text: #1d2425;
                --muted: #5b686d;
                --line: rgba(29, 36, 37, 0.12);
                --brand: #b55400;
                --brand-soft: rgba(181, 84, 0, 0.12);
                --shadow: 0 24px 60px rgba(27, 31, 35, 0.12);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(181, 84, 0, 0.14), transparent 22%),
                    linear-gradient(135deg, var(--bg), #eef5f6);
            }

            #app {
                width: min(760px, calc(100vw - 32px));
                margin: 40px auto;
            }

            .shell {
                display: grid;
                gap: 20px;
                padding: 28px;
                border-radius: 28px;
                background: rgba(255, 253, 249, 0.92);
                box-shadow: var(--shadow);
                border: 1px solid rgba(255, 255, 255, 0.75);
            }

            .hero h1,
            .card h2 {
                margin: 0;
                letter-spacing: -0.04em;
            }

            .hero h1 {
                font-size: clamp(2.4rem, 8vw, 4.4rem);
                line-height: 0.95;
            }

            .hero p,
            .card p,
            li {
                color: var(--muted);
            }

            .eyebrow {
                display: inline-flex;
                margin-bottom: 12px;
                padding: 6px 11px;
                border-radius: 999px;
                background: var(--brand-soft);
                color: var(--brand);
                text-transform: uppercase;
                letter-spacing: 0.12em;
                font-size: 0.74rem;
                font-weight: 700;
            }

            .card {
                padding: 22px;
                border-radius: 22px;
                background: var(--card);
                border: 1px solid var(--line);
            }

            ul {
                margin: 14px 0 0;
                padding-left: 20px;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="%VEXA_ENTRYPOINT%"></script>
    </body>
</html>
